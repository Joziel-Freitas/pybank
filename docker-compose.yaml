services:
  db:
    container_name: pybank_db
    image: mysql:8.0
    restart: always

    # 1. Security: Load sensitive credentials from the .env file
    env_file:
      - .env

    # 2. Timezone configuration
    environment:
      TZ: America/Sao_Paulo

    # 3. Encoding settings (UTF8MB4 for full emoji/character support) and auth plugin
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

    # 4. Connectivity: Expose MySQL port to the host machine
    ports:
      - "3306:3306"

    # 5. Persistence: Map local volumes for data survival and schema initialization
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
